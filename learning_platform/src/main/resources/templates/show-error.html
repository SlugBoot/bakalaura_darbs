<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Error - Slugboot</title>
	<!-- Using a standard CDN for styling consistency -->
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
	<style>
		.error-template {
			padding: 40px 15px;
			text-align: center;
		}

		.error-actions {
			margin-top: 15px;
			margin-bottom: 15px;
		}

		.error-actions .btn {
			margin-right: 10px;
		}
	</style>
</head>

<body class="bg-light">
	<div class="container">
		<div class="row">
			<div class="col-md-12">
				<div class="error-template mt-5 shadow-sm bg-white rounded">
					<h1 class="text-danger">Oops!</h1>

					<!-- Displays the numeric error code (e.g., 404, 500) -->
					<h2 th:text="'Status Code: ' + ${errorCode}">Status Code: 500</h2>

					<div class="error-details my-4">
						<!-- Displays the specific error message -->
						<p class="lead" th:text="${errorMessage}">
							Sorry, an error has occurred, Requested page not found!
						</p>
					</div>

					<div class="error-actions">
						<a th:href="@{/}" class="btn btn-primary btn-lg">
							<span class="glyphicon glyphicon-home"></span>
							Take Me Home
						</a>
						<a href="mailto:support@slugboot.app" class="btn btn-outline-secondary btn-lg">
							<span class="glyphicon glyphicon-envelope"></span>
							Contact Support
						</a>
					</div>
				</div>
			</div>
		</div>
	</div>
</body>

</html>
