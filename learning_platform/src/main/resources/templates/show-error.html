<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Kļūda - Sistēma</title>
    <!-- REFACTORED: Pievienots kopējais stila fails -->
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <style>
        /* Specifiski stili kļūdu lapai, lai izceltu brīdinājumu */
        .error-container {
            text-align: center;
            padding: 50px 20px;
        }
        .error-code {
            font-size: 4rem;
            color: var(--danger-red);
            font-weight: bold;
            margin-bottom: 0;
        }
        .error-message {
            font-size: 1.5rem;
            color: var(--secondary-gray);
            margin-bottom: 30px;
        }
        .technical-details {
            text-align: left;
            background: #f8d7da;
            padding: 15px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.85rem;
            margin-top: 20px;
            display: inline-block;
            max-width: 100%;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <header>
        <h1>Akadēmiskā vadības sistēma</h1>
        <nav>
            <a th:href="@{/}">Home</a>
        </nav>
    </header>

    <div class="container error-container">
        <p class="error-code" th:text="${errorCode}">500</p>
        <h2 class="text-danger">An unexpected error has occured!</h2>
        <p class="error-message" th:text="${errorMessage}">Internal Server Error</p>
        
        <p>We apologize for any inconveniences cause by this. Please contact the system administrator.</p>

        <div style="margin-top: 30px;">
            <a th:href="@{/}" class="btn btn-primary">Return to Dashboard</a>
        </div>

        <div th:if="${exceptionMessage}" class="technical-details">
            <strong>Technical details</strong> <span th:text="${exceptionMessage}">Error detail message</span>
        </div>
    </div>
</body>
</html>
