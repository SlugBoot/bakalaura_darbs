<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Slugboot - Pieteikšanās</title>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
	<style>
		body {
			background-color: #f8f9fa;
			display: flex;
			align-items: center;
			justify-content: center;
			height: 100vh;
		}

		.login-card {
			width: 100%;
			max-width: 400px;
			padding: 20px;
			border-radius: 10px;
			box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
			background: white;
		}
	</style>
</head>

<body>

	<div class="login-card">
		<h2 class="text-center mb-4">Login</h2>

		<div th:if="${errorMessage}" class="alert alert-danger" role="alert">
			<span th:text="${errorMessage}">Invalid credentials.</span>
		</div>

		<div th:if="${logoutMessage}" class="alert alert-success" role="alert">
			<span th:text="${logoutMessage}"></span>
		</div>

		<form th:action="@{/login}" method="post">
			<div class="mb-3">
				<label for="username" class="form-label">Username</label>
				<input type="email" id="username" name="username" class="form-control" required autofocus>
			</div>
			<div class="mb-3">
				<label for="password" class="form-label">Password</label>
				<input type="password" id="password" name="password" class="form-control" required>
			</div>
			<button type="submit" class="btn btn-primary w-100">Sign in</button>
		</form>

		<div class="mt-3 text-center text-muted">
			<small>Access is managed by the system administrator.</small>
		</div>
	</div>

</body>

</html>
