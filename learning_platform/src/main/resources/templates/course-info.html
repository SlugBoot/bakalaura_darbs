<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">
	<head></head>
	<body>
		<a th:href="${previousUrl}"><button type="button">Back</button></a>
		<h1 th:text="${course.getCourseName()}"></h1>
		<h2 th:text="${course.getCourseDesc()}"></h2>
		<p th:text="'Teaching professor: ' + ${course.getProfessor().getName()} + ' ' + ${course.getProfessor().getSurname()}"></p>
		
		<a th:href="@{/course/crud/{slug}/add(slug=${course.getSlug()}, referer=${previousUrl})}">
			<button type="button">Add student to Course</button>
		</a>
		<form th:action="@{/course/crud/provision}" method=post>
			<input type="hidden" name="uuid" th:value="${course.getCId()}" />
			<button type="submit">Create Instances</button>
		</form>
		<form th:action="@{/course/crud/deploy}" method=post>
			<input type="hidden" name="uuid" th:value="${course.getCId()}" />
			<input type="hidden" name="referer" th:value="${previousUrl}" />
			<button type="submit">Start and Deploy Lab</button>
		</form>
		<form th:action="@{/course/crud/cleanup}" method=post>
			<input type="hidden" name="uuid" th:value="${course.getCId()}" />
			<input type="hidden" name="studentId" th:value="${student.getPersonId()}" />
			<button type="submit">Delete all instances</button>
		</form>
		<p>Note: Initialization and Deployment can take some time.</p>
		<table border = 1px>
			<th colspan="7">Student List</th>
			<tr>
				<td>Student ID</td>
				<td>Student Name</td>
				<td>Student Middle Name</td>
				<td>Student Surname</td>
				<td>Student Email</td>
				<td>Student Username</td>
				<td>Remove</td>
			</tr>
			<tr th:each="student : ${course.getStudents()}">
				<td th:text="${student.getPersonId()}"></td>
				<td th:text="${student.getName()}"></td>
				<td th:text="${student.getMiddleName()}"></td>
				<td th:text="${student.getSurname()}"></td>
				<td th:text="${student.getEmail()}"></td>
				<td th:text="${student.getUsername()}"></td>
				<td>
					<form th:action="@{/course/crud/remove-student}" method=post>
						<input type="hidden" name="uuid" th:value="${course.getCId()}" />
						<input type="hidden" name="studentId" th:value="${student.getPersonId()}" />
						<button type="submit">Remove from Course</button>
					</form>
				</td>
			</tr>
		</table>
		<table border="1px">
			<th colspan="3"> Instance List</th>
			<tr>
				<td>Student Username</td>
				<td>IP address</td>
				<td>Instance status</td>
				<td>Action</td>
			</tr>
			<tr th:each="i : ${instance}">
				<td th:text="${i.getStudent().getUsername()}"></td>
				<td th:text="${i.getIpAddress()}"></td>
				<td th:text="${i.getStatus()}"></td>
				<td>
		            <span th:if="${i.getStatus() != null && i.getStatus().name() == 'RUNNING'}">
		                <a th:href="@{/course/crud/instance/terminal(instanceId=${i.getInstanceId()})}" target="_blank">
		                    <button type="button" style="background-color: #4CAF50; color: white; border: none; padding: 4px 8px; cursor: pointer;">
		                        Connect to Console
		                    </button>
		                </a>
		            </span>
		            <span th:unless="${i.getStatus() != null && i.getStatus().name() == 'RUNNING'}" style="color: #888; font-style: italic;">
		                Offline
		            </span>
		        </td>
			</tr>
		</table>
	</body>
</html>
