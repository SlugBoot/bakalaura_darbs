<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">

<head>
	<link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>
	<div class="container">
		<nav>
			<ul>
				<a th:href="@{/professor/home}">
					<button type="button">Home Page</button>
				</a>
			</ul>
			<ul>
				<a th:href="@{/course/crud/{slug}/update(slug=${course.getSlug()})}">
					<button type="button">Update course Info</button>
				</a>
			</ul>
			<ul>
				<form th:action="@{/course/crud/delete}" method=post>
					<input type="hidden" name="uuid" th:value="${course.getCId()}" />
					<input type="hidden" name="referer" th:value="${previousUrl}" />
					<button type="submit">Delete Course</button>
				</form>
			</ul>
		</nav>
		<h1 th:text="${course.getCourseName()}"></h1>
		<h2 th:text="${course.getCourseDesc()}"></h2>
		<p
			th:text="'Teaching professor: ' + ${course.getProfessor().getName()} + ' ' + ${course.getProfessor().getSurname()}">
		</p>

		<nav>
			<ul>
				<a
					th:href="@{/course/crud/{slug}/add(slug=${course.getSlug()}, referer=${'/course/crud/name/' + course.getSlug()})}">
					<button type="button">Add student to Course</button>
				</a>
			</ul>
			<ul>
				<form th:action="@{/course/crud/provision}" method=post>
					<input type="hidden" name="uuid" th:value="${course.getCId()}" />
					<input type="hidden" name="referer" th:value="${previousUrl}" />
					<button type="submit">Create Instances</button>
				</form>
			</ul>
			<ul>
				<form th:action="@{/course/crud/deploy}" method=post>
					<input type="hidden" name="uuid" th:value="${course.getCId()}" />
					<input type="hidden" name="referer" th:value="${previousUrl}" />
					<button type="submit">Start and Deploy Lab</button>
				</form>
			</ul>
			<ul>
				<form th:action="@{/course/crud/cleanup}" method=post>
					<input type="hidden" name="uuid" th:value="${course.getCId()}" />
					<input type="hidden" name="referer" th:value="${previousUrl}" />
					<button type="submit">Delete all instances</button>
				</form>
			</ul>
		</nav>
		<p>Note: Initialization and Deployment can take some time.</p>
		<p>Statuses update automatically, </p>
		<table>
			<th colspan="7">Student List</th>
			<tr>
				<td>Student ID</td>
				<td>Student Name</td>
				<td>Student Middle Name</td>
				<td>Student Surname</td>
				<td>Student Email</td>
				<td>Student Username</td>
				<td>Remove</td>
			</tr>
			<tr th:each="student : ${course.getStudents()}">
				<td th:text="${student.getPersonId()}"></td>
				<td th:text="${student.getName()}"></td>
				<td th:text="${student.getMiddleName()}"></td>
				<td th:text="${student.getSurname()}"></td>
				<td th:text="${student.getEmail()}"></td>
				<td th:text="${student.getUsername()}"></td>
				<td>
					<form th:action="@{/course/crud/remove-student}" method=post>
						<input type="hidden" name="uuid" th:value="${course.getCId()}" />
						<input type="hidden" name="studentId" th:value="${student.getPersonId()}" />
						<button type="submit">Remove from Course</button>
					</form>
				</td>
			</tr>
		</table>
		<table border="1px" id="instances-table">
			<th colspan="3"> Instance List</th>
			<tr>
				<td>Student Username</td>
				<td>IP address</td>
				<td>Instance status</td>
				<td>Action</td>
			</tr>
			<tr th:each="i : ${instance}">
				<td th:text="${i.getStudent().getUsername()}"></td>
				<td th:text="${i.getIpAddress()}"></td>
				<td th:text="${i.getStatus()}"></td>
				<td>
					<span th:if="${i.getStatus() != null && i.getStatus().name() == 'RUNNING'}">
						<a th:href="@{/course/crud/instance/terminal(instanceId=${i.getInstanceId()})}" target="_blank">
							<button type="button">
								Connect to Console
							</button>
						</a>
					</span>
					<span th:unless="${i.getStatus() != null && i.getStatus().name() == 'RUNNING'}">
						Offline
					</span>
				</td>
			</tr>
		</table>

		<script th:src="@{/webjars/sockjs-client/sockjs.min.js}"></script>
		<script th:src="@{/webjars/stomp-websocket/stomp.min.js}"></script>

		<script th:inline="javascript">
			var courseId = [[${course.getCId().toString()}]];
			var socket = new SockJS('/ws-status');
			var stompClient = Stomp.over(socket);

			stompClient.heartbeat.outgoing = 10000;
			stompClient.heartbeat.incoming = 10000;

			stompClient.connect({}, function (frame) {
				console.log('Connected to Status WebSocket');

				stompClient.subscribe('/topic/course/' + courseId, function (message) {
					if (message.body === "refresh") {
						console.log("Status update received. Refreshing page...");
						fetch(window.location.href)
							.then(response => response.text())
							.then(html => {
								var parser = new DOMParser();
								var doc = parser.parseFromString(html, 'text/html');

								var newTable = doc.getElementById('instances-table');
								var oldTable = document.getElementById('instances-table');

								if (oldTable && newTable) {
									oldTable.innerHTML = newTable.innerHTML;
									console.log("Table updated successfully!");
								}
							})
							.catch(err => console.error("Failed to update status table fragment:", err));
					}
				});
			});
		</script>
	</div>
</body>

</html>
