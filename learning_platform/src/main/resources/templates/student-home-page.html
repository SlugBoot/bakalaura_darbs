<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">

<head></head>

<body>
	<nav>
		<a th:href="@{/logout}">
			<button type="button">Logout</button>
		</a>
		<a th:href="@{/student/crud/update/{username}(username=${student.getUsername()}, referer='/student/home')}">
			<button type="button">Update Personal info</button>
		</a>
	</nav>
	<h1 th:text="${student.getName() + ' ' + student.getSurname()}"></h1>
	<table border=1px>
		<thead> Course List</thead>
		<tr>
			<td>Course ID</td>
			<td>Course Name</td>
			<td>Course Description</td>
			<td>Course Info</td>
			<td>Remove Course</td>
		</tr>
		<tr th:each="course : ${filtered_courses}">
			<td th:text="${course.getCId()}"></td>
			<td th:text="${course.getCourseName()}"></td>
			<td th:text="${course.getCourseDesc()}"></td>
			<td>
				<a th:href="@{/course/crud/{slug}(uuid=${course.getSlug()}, referer='/student/home')}">
					<button type="button">Info</button>
				</a>
			</td>
			<td>
				<a th:href="@{/student/home/remove?(courseId=${course.getCId()})">
					<button type="button">Remove Course</button>
				</a>
			</td>
		</tr>
	</table>

	<table border="1px" id="instances-table">
		<th colspan="5"> Instance List</th>
		<tr>
			<td>Course name</td>
			<td>Course Professor</td>
			<td>IP address</td>
			<td>Instance status</td>
			<td>Action</td>
		</tr>
		<tr th:each="i : ${instance}">
			<td th:text="${i.getCourse().getCourseName()}"></td>
			<td th:text="${i.getCourse().getProfessor().getName() + ' ' + i.getCourse().getProfessor().getSurnam()}">
			</td>
			<td th:text="${i.getIpAddress()}"></td>
			<td th:text="${i.getStatus()}"></td>
			<td>
				<span th:if="${i.getStatus() != null && i.getStatus().name() == 'RUNNING'}">
					<a th:href="@{/course/crud/instance/terminal(instanceId=${i.getInstanceId()})}" target="_blank">
						<button type="button"
							style="background-color: #4CAF50; color: white; border: none; padding: 4px 8px; cursor: pointer;">
							Connect to Console
						</button>
					</a>
				</span>
				<span th:unless="${i.getStatus() != null && i.getStatus().name() == 'RUNNING'}"
					style="color: #888; font-style: italic;">
					Offline
				</span>
			</td>
		</tr>
	</table>

	<script th:src="@{/webjars/sockjs-client/sockjs.min.js}"></script>
	<script th:src="@{/webjars/stomp-websocket/stomp.min.js}"></script>

	<script th:inline="javascript">
		var socket = new SockJS('/ws-status');
		var stompClient = Stomp.over(socket);

		stompClient.heartbeat.outgoing = 10000;
		stompClient.heartbeat.incoming = 10000;

		stompClient.connect({}, function (frame) {
			console.log('Connected to Status WebSocket');

			var courseIds = [];
			/*[th:each="course : ${filtered_courses}"]*/
			courseIds.push([[${course.getCId().toString()}]]);
			/*[/]*/

			courseIds.forEach(function (courseId) {
				stompClient.subscribe('/topic/course/' + courseId, function (message) {
					if (message.body === "refresh") {
						console.log("Status update received for course " + courseId + ". Refreshing page component...");
						fetch(window.location.href)
							.then(response => response.text())
							.then(html => {
								var parser = new DOMParser();
								var doc = parser.parseFromString(html, 'text/html');

								var newTable = doc.getElementById('instances-table');
								var oldTable = document.getElementById('instances-table');

								if (oldTable && newTable) {
									oldTable.innerHTML = newTable.innerHTML;
									console.log("Student instance table refreshed successfully!");
								}
							})
							.catch(err => console.error("Failed to update status table fragment:", err));
					}
				});
			});
		});
	</script>
</body>

</html>
