<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">

<head>
	<title>Student Dashboard</title>
	<link rel="stylesheet" th:href="@{/css/styles.css}">
	<script th:src="@{/webjars/sockjs-client/sockjs.min.js}"></script>
	<script th:src="@{/webjars/stomp-websocket/stomp.min.js}"></script>
</head>

<body>
	<header>
		<h1 th:text="'Student Dashboard: ' + ${student.name}">Student Home</h1>
		<nav>
			<a th:href="@{/login?logout}">
				<button type="button">Logout</button>
			</a>
			<a th:href="@{/student/crud/update/{username}(username=${student.getUsername()}, referer='/student/home')}">
				<button type="button">Update Personal info</button>
			</a>
		</nav>
	</header>

	<div class="container">
		<h2>My Lab Instances</h2>
		<table id="instances-table">
			<thead>
				<tr>
					<th>Course</th>
					<th>Status</th>
					<th>Actions</th>
				</tr>
			</thead>
			<tbody>
				<tr th:each="inst : ${instance}" th:id="'instance-row-' + ${inst.instanceId}">
					<td th:text="${inst.course.courseName}">Course Name</td>
					<td>
						<span th:id="'status-' + ${inst.instanceId}" th:class="'status status-' + ${inst.status}"
							th:text="${inst.status}">STATUS</span>
					</td>
					<td>
						<a th:href="@{/student/home/remove(courseId=${inst.course.getCId()})}">
							<button type="button">Remove Course</button>
						</a>
					</td>
					<td>
						<div th:id="'action-' + ${inst.instanceId}">
							<a th:if="${inst.status.name() == 'RUNNING'}"
								th:href="@{/course/crud/instance/terminal(instanceId=${inst.instanceId})}"
								target="_blank" class="btn btn-success">Open
								Terminal</a>
						</div>
					</td>
				</tr>
			</tbody>
		</table>

		<script th:inline="javascript">
			var socket = new SockJS('/ws-status');
			var stompClient = Stomp.over(socket);

			stompClient.heartbeat.outgoing = 10000;
			stompClient.heartbeat.incoming = 10000;

			stompClient.connect({}, function (frame) {
				console.log('Connected to Status WebSocket');

				var subscribedCourses = {};

				/*[# th:each="inst : ${instance}"]*/
				(function () {
					var courseId = [[${inst.course.getCId().toString()}]];

					if (!subscribedCourses[courseId]) {
						subscribedCourses[courseId] = true;

						stompClient.subscribe('/topic/course/' + courseId, function (message) {
							if (message.body === "refresh") {
								console.log("Status update received for course " + courseId + ". Refreshing student table fragment...");

								fetch(window.location.href)
									.then(response => response.text())
									.then(html => {
										var parser = new DOMParser();
										var doc = parser.parseFromString(html, 'text/html');

										var newTable = doc.getElementById('instances-table');
										var oldTable = document.getElementById('instances-table');

										if (oldTable && newTable) {
											oldTable.innerHTML = newTable.innerHTML;
											console.log("Student dashboard table updated successfully!");
										}
									})
									.catch(err => console.error("Failed to update student table fragment:", err));
							}
						});
					}
				})();
				/*[/]*/
			}, function (error) {
				console.error("WebSocket transport error: ", error);
			});
		</script>
	</div>
</body>

</html>
